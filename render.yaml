services:
  - type: web
    name: sa-predict-app
    runtime: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm install --include=dev && npm --prefix ../frontend install --include=dev && npm --prefix ../frontend run build && npm run build && npm run prisma:generate
    startCommand: sh -c 'npx prisma migrate deploy && npm start'
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: sa-predict-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"

databases:
  - name: sa-predict-db
    plan: free
    region: frankfurt
    databaseName: sa_pred_market
